<script>
// 色彩模式:默认按本地时间自动换色,也可手动锁定 light/dark/neutral。
(function(){
  var root=document.documentElement, btn=document.getElementById('theme-toggle');
  function period(){
    var d=new Date(),h=d.getHours()+d.getMinutes()/60;
    if(h<2)return 'late';
    if(h<8)return 'sleep';
    if(h<10)return 'morning-a';
    if(h<12)return 'morning-b';
    if(h<14)return 'afternoon-a';
    if(h<16)return 'afternoon-b';
    if(h<18)return 'afternoon-c';
    if(h<20)return 'evening-a';
    if(h<22)return 'evening-b';
    return 'evening-c';
  }
  function stored(){var s=localStorage.getItem('theme');return (s==='light'||s==='dark'||s==='neutral')?s:'';}
  function effective(){return stored() || 'auto';}
  function paint(){if(!btn)return;var m=effective();btn.textContent=m==='auto'?'◷':(m==='dark'?'☼':(m==='neutral'?'◐':'☾'));btn.title=m==='auto'?'色彩模式:按时间自动':'色彩模式:'+m;}
  function apply(){root.setAttribute('data-period',period());var s=stored();if(s)root.setAttribute('data-theme',s);else root.removeAttribute('data-theme');paint();}
  if(btn)btn.addEventListener('click',function(){var order=['auto','light','dark','neutral'];var i=order.indexOf(effective()),next=order[(i+1)%order.length];if(next==='auto')localStorage.removeItem('theme');else localStorage.setItem('theme',next);apply();});
  setInterval(apply,60000);
  document.addEventListener('visibilitychange',function(){if(!document.hidden)apply();});
  apply();
})();
</script>
</body>
