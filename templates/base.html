<script>
// 明暗模式:默认跟随系统,可手动切换并记住(全站一致)
(function(){
  var root=document.documentElement, btn=document.getElementById('theme-toggle');
  function cur(){var s=localStorage.getItem('theme');return s?s==='dark':matchMedia('(prefers-color-scheme:dark)').matches;}
  function paint(){if(btn)btn.textContent=cur()?'☀️':'🌙';}
  function apply(){var s=localStorage.getItem('theme');if(s)root.setAttribute('data-theme',s);else root.removeAttribute('data-theme');paint();}
  if(btn)btn.addEventListener('click',function(){localStorage.setItem('theme',cur()?'light':'dark');apply();});
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change',paint);
  apply();
})();
</script>
</body>
