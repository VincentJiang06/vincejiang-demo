<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<script>(function(){try{var r=document.documentElement;function p(){var d=new Date(),h=d.getHours()+d.getMinutes()/60;return h<2?'late':h<8?'sleep':h<10?'morning-a':h<12?'morning-b':h<14?'afternoon-a':h<16?'afternoon-b':h<18?'afternoon-c':h<20?'evening-a':h<22?'evening-b':'evening-c';}r.setAttribute('data-period',p());var s=localStorage.getItem('theme');if(s==='dark'||s==='light'||s==='neutral')r.setAttribute('data-theme',s);}catch(e){}})();</script>
{{HEAD}}
<link rel="icon" href="/favicon.png?v=1" type="image/png">
<link rel="apple-touch-icon" href="/favicon.png?v=1">
<style>{{CSS}}</style>
</head>
<body>
<div class="ambient-bg" aria-hidden="true">
<svg viewBox="0 0 1440 980" preserveAspectRatio="none" role="img">
<defs>
<style>.ambient-dot{r:1px}</style>
<linearGradient id="ambient-stroke" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="var(--ambient-line-a)"/>
<stop offset="48%" stop-color="var(--ambient-line-b)"/>
<stop offset="100%" stop-color="var(--ambient-line-c)"/>
<animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="38s" repeatCount="indefinite"/>
</linearGradient>
<pattern id="ambient-dot-grid" width="31" height="31" patternUnits="userSpaceOnUse" patternTransform="translate(-8 -4)">
<animateTransform attributeName="patternTransform" type="translate" values="-8 -4;8 6;-8 -4" dur="54s" repeatCount="indefinite"/>
<circle class="ambient-dot" cx="4" cy="4" fill="url(#ambient-stroke)" opacity=".62"/>
</pattern>
<g id="wave-source" fill="none">
<path d="M-180 154 C -30 118, 86 198, 226 166 S 404 90, 536 132 S 716 244, 856 204 S 1030 94, 1152 130 S 1340 224, 1474 188 S 1612 142, 1700 156"/>
<path d="M-180 318 C -28 282, 76 360, 216 324 S 420 384, 548 336 S 746 408, 880 356 S 1060 246, 1200 292 S 1398 400, 1524 348 S 1648 306, 1710 326"/>
<path d="M-190 520 C -30 486, 86 568, 236 528 S 426 430, 564 484 S 764 610, 906 552 S 1096 448, 1234 500 S 1440 610, 1578 558 S 1698 514, 1730 526"/>
<path d="M-200 734 C -48 688, 74 786, 230 744 S 426 660, 578 716 S 788 842, 936 780 S 1130 668, 1274 722 S 1490 836, 1630 786 S 1740 744, 1770 756"/>
</g>
<filter id="wave-dot-grow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
<feMorphology in="SourceGraphic" operator="dilate" radius="1.45" result="grown"/>
<feGaussianBlur in="grown" stdDeviation=".18" result="soft-grown"/>
<feMerge><feMergeNode in="soft-grown"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="ambient-ripple" x="-10%" y="-20%" width="120%" height="140%">
<feTurbulence type="fractalNoise" baseFrequency=".004 .009" numOctaves="1" seed="7" result="noise">
<animate attributeName="baseFrequency" values=".004 .009;.007 .007;.004 .009" dur="24s" repeatCount="indefinite"/>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
</filter>
<mask id="wave-response-mask" maskUnits="userSpaceOnUse" x="-180" y="-100" width="1800" height="1180">
<g stroke="#fff" stroke-linecap="round" stroke-width="128" opacity=".88">
<animateTransform attributeName="transform" type="translate" values="-22 -10;22 10;-22 -10" dur="56s" repeatCount="indefinite"/>
<use href="#wave-source"/>
</g>
</mask>
</defs>
<g class="dot-field" opacity=".58">
<rect x="-180" y="-100" width="1800" height="1180" fill="url(#ambient-dot-grid)"/>
</g>
<g class="dot-field wave-reactive" mask="url(#wave-response-mask)" filter="url(#wave-dot-grow)" opacity=".72">
<rect x="-180" y="-100" width="1800" height="1180" fill="url(#ambient-dot-grid)"/>
</g>
<g class="main-waves" filter="url(#ambient-ripple)" stroke="url(#ambient-stroke)" stroke-linecap="round" stroke-width="1.55" vector-effect="non-scaling-stroke" opacity=".96">
<animateTransform attributeName="transform" type="translate" values="-22 -10;22 10;-22 -10" dur="56s" repeatCount="indefinite"/>
<use href="#wave-source"/>
</g>
</svg>
</div>
{{NAV}}
{{MAIN}}
{{FOOTER}}
<script>
// 色彩模式:默认按本地时间自动换色,也可手动锁定 light/dark/neutral。
(function(){
  var root=document.documentElement, btn=document.getElementById('theme-toggle');
  function period(){
    var d=new Date(),h=d.getHours()+d.getMinutes()/60;
    if(h<2)return 'late';
    if(h<8)return 'sleep';
    if(h<10)return 'morning-a';
    if(h<12)return 'morning-b';
    if(h<14)return 'afternoon-a';
    if(h<16)return 'afternoon-b';
    if(h<18)return 'afternoon-c';
    if(h<20)return 'evening-a';
    if(h<22)return 'evening-b';
    return 'evening-c';
  }
  function stored(){var s=localStorage.getItem('theme');return (s==='light'||s==='dark'||s==='neutral')?s:'';}
  function effective(){return stored() || 'auto';}
  function paint(){if(!btn)return;var m=effective();btn.textContent=m==='auto'?'◷':(m==='dark'?'☼':(m==='neutral'?'◐':'☾'));btn.title=m==='auto'?'色彩模式:按时间自动':'色彩模式:'+m;}
  function apply(){root.setAttribute('data-period',period());var s=stored();if(s)root.setAttribute('data-theme',s);else root.removeAttribute('data-theme');paint();}
  if(btn)btn.addEventListener('click',function(){var order=['auto','light','dark','neutral'];var i=order.indexOf(effective()),next=order[(i+1)%order.length];if(next==='auto')localStorage.removeItem('theme');else localStorage.setItem('theme',next);apply();});
  setInterval(apply,60000);
  document.addEventListener('visibilitychange',function(){if(!document.hidden)apply();});
  apply();
})();
</script>
</body>
</html>
