<script>
// 色彩模式:仅保留 light/dark;未手动选择时跟随系统。
(function(){
  var root=document.documentElement, btn=document.getElementById('theme-toggle');
  var media=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
  function stored(){var s=localStorage.getItem('theme');return (s==='light'||s==='dark')?s:'';}
  function effective(){return stored() || (media&&media.matches?'dark':'light');}
  function paint(){if(!btn)return;var m=effective();btn.textContent=m==='dark'?'☼':'☾';btn.title='切换明暗模式:当前 '+m;}
  function apply(){var s=stored();if(s)root.setAttribute('data-theme',s);else root.removeAttribute('data-theme');paint();}
  if(btn)btn.addEventListener('click',function(){localStorage.setItem('theme',effective()==='dark'?'light':'dark');apply();});
  if(media&&media.addEventListener)media.addEventListener('change',function(){if(!stored())apply();});
  apply();
})();
</script>
</body>
