<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1E2028"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="640" height="360" fill="#08090C"/>
  <rect width="640" height="360" fill="url(#dots)"/>
  <!-- 光晕 -->
  <circle cx="320" cy="64" r="60" fill="#E4E4E8" opacity=".14" filter="url(#soft)"/>
  <circle cx="132" cy="210" r="52" fill="#FF4D6A" opacity=".10" filter="url(#soft)"/>
  <circle cx="500" cy="228" r="56" fill="#FFC53D" opacity=".10" filter="url(#soft)"/>
  <!-- 电路走线(正交总线) -->
  <g fill="none" stroke-width="2" opacity=".85">
    <path d="M320 88 V120 H132 V168" stroke="#FF4D6A" opacity=".55"/>
    <path d="M320 88 V120 H320 V168" stroke="#5B8AF5" opacity=".55"/>
    <path d="M320 88 V120 H500 V168" stroke="#FFC53D" opacity=".55"/>
    <path d="M132 236 V268 H226 V300" stroke="#FF4D6A" opacity=".35"/>
    <path d="M320 236 V268 H320 V300" stroke="#5B8AF5" opacity=".35"/>
    <path d="M500 236 V268 H412 V300" stroke="#34D399" opacity=".45"/>
    <path d="M226 202 H262" stroke="#2A2D38" stroke-dasharray="5 6"/>
    <path d="M378 202 H414" stroke="#2A2D38" stroke-dasharray="5 6"/>
  </g>
  <!-- 根芯片 -->
  <rect x="284" y="40" width="72" height="48" rx="5" fill="#101116" stroke="#E4E4E8" stroke-width="1.6"/>
  <circle cx="348" cy="48" r="3" fill="#E4E4E8"/>
  <rect x="296" y="56" width="48" height="5" rx="2.5" fill="#3A3D48"/>
  <rect x="296" y="68" width="34" height="5" rx="2.5" fill="#2A2D38"/>
  <!-- 三支芯片 -->
  <g>
    <rect x="96" y="168" width="72" height="48" rx="5" fill="#0E0F14" stroke="#FF4D6A" stroke-width="1.4"/>
    <rect x="108" y="182" width="46" height="5" rx="2.5" fill="#57303C"/>
    <rect x="108" y="194" width="32" height="5" rx="2.5" fill="#33222B"/>
    <rect x="284" y="168" width="72" height="48" rx="5" fill="#0E0F14" stroke="#5B8AF5" stroke-width="1.4"/>
    <rect x="296" y="182" width="46" height="5" rx="2.5" fill="#2E3D63"/>
    <rect x="296" y="194" width="32" height="5" rx="2.5" fill="#232C46"/>
    <rect x="464" y="168" width="72" height="48" rx="5" fill="#0E0F14" stroke="#FFC53D" stroke-width="1.4"/>
    <rect x="476" y="182" width="46" height="5" rx="2.5" fill="#5C4A22"/>
    <rect x="476" y="194" width="32" height="5" rx="2.5" fill="#38301C"/>
  </g>
  <!-- 深层暗芯片 + 绿色防御 -->
  <g opacity=".8">
    <rect x="190" y="300" width="72" height="42" rx="5" fill="#0C0D11" stroke="#2A2D38" stroke-width="1.2"/>
    <rect x="284" y="300" width="72" height="42" rx="5" fill="#0C0D11" stroke="#2A2D38" stroke-width="1.2"/>
    <rect x="376" y="300" width="72" height="42" rx="5" fill="#0C0D11" stroke="#34D399" stroke-width="1.3"/>
  </g>
  <!-- 分层虚线 -->
  <path d="M24 258 H616" stroke="#23252E" stroke-width="1" stroke-dasharray="7 9"/>
  <text x="24" y="248" fill="#3C3F4A" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">LEVEL 02</text>
</svg>
