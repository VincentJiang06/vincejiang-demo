<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 服务状态 · OpenAI & Claude</title>
  <meta name="description" content="一眼看懂 OpenAI 和 Claude 现在能不能正常用 —— 官方状态聚合 + 通俗中文解说。">
  <style>
    :root{
      color-scheme: light dark;
      --bg:#fbfbfd; --card:#fff; --fg:#1d1d1f; --sub:#6e6e73; --line:#e6e6eb;
      --green:#16a34a; --amber:#d97706; --orange:#ea580c; --red:#dc2626; --blue:#2563eb; --gray:#9ca3af;
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#000; --card:#1c1c1e; --fg:#f5f5f7; --sub:#98989d; --line:#2c2c2e; }
    }
    *{box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg); color:var(--fg); margin:0; line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:680px; margin:0 auto; padding:3.5rem 1.25rem 4rem}
    header{margin-bottom:2rem}
    h1{font-size:1.9rem; margin:0 0 .35rem; letter-spacing:-.01em}
    header p{color:var(--sub); margin:0; font-size:.95rem}
    .cards{display:flex; flex-direction:column; gap:1rem}
    .card{
      background:var(--card); border:1px solid var(--line); border-radius:16px;
      padding:1.25rem 1.35rem; box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .top{display:flex; align-items:center; gap:.6rem; margin-bottom:.65rem}
    .dot{width:11px; height:11px; border-radius:50%; flex:0 0 auto; background:var(--gray);
         box-shadow:0 0 0 0 currentColor}
    .name{font-size:1.15rem; font-weight:650; flex:1 1 auto}
    .name a{color:inherit; text-decoration:none}
    .name a:hover{text-decoration:underline}
    .badge{font-size:.72rem; font-weight:600; padding:.15rem .5rem; border-radius:999px;
           border:1px solid var(--line); color:var(--sub); white-space:nowrap}
    .zh{font-size:1.08rem; font-weight:500; margin:.1rem 0 .55rem; color:var(--fg)}
    .en{font-size:.82rem; color:var(--sub); margin:0}
    .incidents{margin:.8rem 0 0; padding:.7rem .8rem; background:rgba(127,127,127,.06);
               border-radius:10px; font-size:.84rem}
    .incidents .ititle{font-weight:600; color:var(--sub); font-size:.72rem; text-transform:uppercase;
                        letter-spacing:.04em; margin-bottom:.35rem}
    .incidents ul{margin:0; padding:0; list-style:none}
    .incidents li{display:flex; gap:.45rem; align-items:baseline; padding:.15rem 0}
    .imp{font-size:.66rem; font-weight:700; padding:.05rem .4rem; border-radius:4px; color:#fff; flex:0 0 auto}
    .incidents a{color:var(--blue); text-decoration:none}
    .skeleton .zh, .skeleton .en{background:linear-gradient(90deg,rgba(127,127,127,.12),rgba(127,127,127,.2),rgba(127,127,127,.12));
      background-size:200% 100%; animation:sh 1.3s infinite; color:transparent; border-radius:6px; min-height:1.1em}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    footer{margin-top:1.8rem; display:flex; align-items:center; gap:.75rem; color:var(--sub); font-size:.82rem}
    footer button{font:inherit; font-size:.82rem; color:var(--blue); background:none; border:none; cursor:pointer; padding:0}
    footer button:hover{text-decoration:underline}
    .back{display:inline-block; margin-top:1.5rem; color:var(--sub); text-decoration:none; font-size:.85rem}
    .back:hover{color:var(--fg)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI 服务状态</h1>
      <p>瞟一眼就知道 OpenAI 和 Claude 现在能不能正常用 · 中文解说由 DeepSeek 实时生成</p>
    </header>

    <div class="cards" id="cards">
      <!-- 占位骨架 -->
      <div class="card skeleton"><div class="top"><span class="dot"></span><span class="name">OpenAI</span></div><p class="zh">加载中…</p><p class="en">&nbsp;</p></div>
      <div class="card skeleton"><div class="top"><span class="dot"></span><span class="name">Claude</span></div><p class="zh">加载中…</p><p class="en">&nbsp;</p></div>
    </div>

    <footer>
      <span id="updated">加载中…</span>
      <button id="refresh">刷新</button>
    </footer>

    <a class="back" href="/">← 返回首页</a>
  </div>

  <script>
    const COLOR = { none:'var(--green)', operational:'var(--green)', minor:'var(--amber)',
                    major:'var(--orange)', critical:'var(--red)', maintenance:'var(--blue)', unknown:'var(--gray)' };
    const LABEL = { none:'正常', minor:'小问题', major:'故障', critical:'严重中断',
                    maintenance:'维护中', unknown:'未知' };
    const IMPCOLOR = { minor:'var(--amber)', major:'var(--orange)', critical:'var(--red)', maintenance:'var(--blue)', none:'var(--gray)' };

    const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function relTime(iso){
      if(!iso) return '';
      const d = (Date.now() - new Date(iso).getTime())/1000;
      if(d < 60) return '刚刚';
      if(d < 3600) return Math.floor(d/60)+' 分钟前';
      if(d < 86400) return Math.floor(d/3600)+' 小时前';
      return Math.floor(d/86400)+' 天前';
    }

    function cardHTML(p){
      const color = COLOR[p.indicator] || 'var(--gray)';
      const label = LABEL[p.indicator] || p.indicator || '未知';
      const zh = p.ok ? (p.zh || '（暂无中文解说，请看下方英文原状态）') : '获取该服务状态失败，请稍后再看。';
      const en = p.description ? esc(p.description) : (p.ok?'':'unreachable');
      let inc = '';
      if(p.incidents && p.incidents.length){
        inc = '<div class="incidents"><div class="ititle">进行中的事件</div><ul>' +
          p.incidents.map(i => {
            const ic = IMPCOLOR[i.impact] || 'var(--gray)';
            const nm = i.shortlink ? `<a href="${esc(i.shortlink)}" target="_blank" rel="noopener">${esc(i.name)}</a>` : esc(i.name);
            return `<li><span class="imp" style="background:${ic}">${esc(i.impact||i.status||'')}</span><span>${nm}</span></li>`;
          }).join('') + '</ul></div>';
      }
      return `<div class="card">
        <div class="top">
          <span class="dot" style="background:${color};color:${color}"></span>
          <span class="name"><a href="${esc(p.page)}" target="_blank" rel="noopener">${esc(p.name)}</a></span>
          <span class="badge">${esc(label)}</span>
        </div>
        <p class="zh">${esc(zh)}</p>
        <p class="en">${en}</p>
        ${inc}
      </div>`;
    }

    let timer = null;
    async function load(){
      try{
        const r = await fetch('/_status/api', { cache:'no-store' });
        if(!r.ok) throw new Error('HTTP '+r.status);
        const d = await r.json();
        document.getElementById('cards').innerHTML = d.providers.map(cardHTML).join('');
        document.getElementById('updated').textContent = '更新于 ' + relTime(d.updated_at);
      }catch(e){
        document.getElementById('updated').textContent = '加载失败，点刷新重试';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();
    timer = setInterval(load, 60000);          // 每 60s 自动刷新
    document.addEventListener('visibilitychange', () => { if(!document.hidden) load(); });
  </script>
</body>
</html>
