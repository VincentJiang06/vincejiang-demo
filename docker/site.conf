# site.conf — 容器内站点 server,覆盖 nginx:alpine 默认 default.conf。
# 监听 :80 明文(HTTPS 由 Cloudflare 边缘终止);geo-open(不拦内地);发布静态站。
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    absolute_redirect off;   # 301/自动补斜杠用相对 Location,避免 http:// 绝对跳转(边缘是 https)

    # 健康检查:容器内 localhost 调用,供 Docker / Traefik 探活。
    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }

    # 安全头(server 级基线)
    include /etc/nginx/snippets/security-headers.conf;

    # 重资源(字体/图片/音视频):内容基本不变,一周缓存 + 重校验。
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|mp4|webm|mp3|wav)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        try_files $uri =404;
    }

    # 代码/数据(JS/CSS/JSON):随迭代原地更新,用 no-cache(每次条件请求校验,未变则 304)
    # ——避免浏览器缓存旧 app.js/styles.css 导致「改了不生效」。
    location ~* \.(css|js|mjs|json|webmanifest)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # 301:skills 展示页已迁成博客文章 /blog/agent-skills/(链权搬家不蒸发)。
    location = /skills  { return 301 /blog/agent-skills/; }
    location ^~ /skills/ { return 301 /blog/agent-skills/; }

    # HTML / 目录:干净 URL;目录回退到其 index.html;立即可见新版本。
    location / {
        try_files $uri $uri/ $uri.html =404;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # 隐藏点文件(放行 ACME well-known)
    location ~ /\.(?!well-known) { deny all; }
}
