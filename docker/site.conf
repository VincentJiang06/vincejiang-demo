# site.conf — 容器内站点 server,覆盖 nginx:alpine 默认 default.conf。
# 监听 :80 明文(HTTPS 由 Cloudflare 边缘终止);geo-open(不拦内地);发布静态站。
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    absolute_redirect off;   # 301/自动补斜杠用相对 Location,避免 http:// 绝对跳转(边缘是 https)

    # 健康检查:容器内 localhost 调用,供 Docker / Traefik 探活。
    location = /health { access_log off; default_type text/plain; return 200 "ok\n"; }

    # 安全头(server 级基线)
    include /etc/nginx/snippets/security-headers.conf;

    # 重资源(字体/图片/音视频):内容基本不变,一周缓存 + 重校验。
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|mp4|webm|mp3|wav)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        try_files $uri =404;
    }

    # 代码/数据(JS/CSS/JSON):随迭代原地更新,用 no-cache(每次条件请求校验,未变则 304)
    # ——避免浏览器缓存旧 app.js/styles.css 导致「改了不生效」。
    location ~* \.(css|js|mjs|json|webmanifest)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # 301:skills 展示页已迁成博客文章 /blog/agent-skills/(链权搬家不蒸发)。
    location = /skills  { return 301 /blog/agent-skills/; }
    location ^~ /skills/ { return 301 /blog/agent-skills/; }
    # 301:双语从「独立 -en slug」改为「主页 + /en/ 子页」,旧英文 URL 搬家。
    location = /blog/fable-scaling-layering-en/ { return 301 /blog/fable-scaling-layering/en/; }
    location = /blog/fable-scaling-layering-en  { return 301 /blog/fable-scaling-layering/en/; }

    # 301:reactor-study 已整站迁至 reactor.vincejiang.com 子域(保留子路径,链权搬家)。
    location = /reactor-study  { return 301 https://reactor.vincejiang.com/; }
    location ^~ /reactor-study/ { rewrite ^/reactor-study/(.*)$ https://reactor.vincejiang.com/$1 permanent; }

    # HTML / 目录:干净 URL;目录回退到其 index.html;立即可见新版本。
    location / {
        try_files $uri $uri/ $uri.html =404;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # 隐藏点文件(放行 ACME well-known)
    location ~ /\.(?!well-known) { deny all; }
}

# reactor.vincejiang.com — reactor-study 独立子域(整站根即原 /reactor-study/ 目录)。
# Traefik 的 *.vincejiang.com catch-all 已把该子域路由到本容器,按 Host 头分流到此块。
server {
    listen      80;
    listen      [::]:80;
    server_name reactor.vincejiang.com;

    root  /usr/share/nginx/html/reactor-study;
    index index.html;
    charset utf-8;
    absolute_redirect off;

    include /etc/nginx/snippets/security-headers.conf;

    # 重资源:一周缓存 + 重校验(与主站同策略)
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|mp4|webm|mp3|wav)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        try_files $uri =404;
    }

    # 代码/数据:no-cache,改了立即生效
    location ~* \.(css|js|mjs|json|webmanifest)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    location ~ /\.(?!well-known) { deny all; }
}
