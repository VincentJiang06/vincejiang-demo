# 手动全站 SEO/GEO 审计(report-only,不部署、不阻塞)。
# 触发:仓库 Actions 页 → 「seo-geo-audit」→ Run workflow。报告进 job summary + artifact。
# 本地等价:cd tools && node audit.mjs
name: seo-geo-audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # 真实 git 日期
      - name: 生成发布 manifest
        run: node tools/gen-manifest.mjs
      - name: 装生成器依赖
        run: cd tools && npm ci --no-audit --no-fund
      - name: 跑审计
        run: cd tools && node audit.mjs --out "$RUNNER_TEMP/audit.md"
      - name: 报告进 job summary
        run: cat "$RUNNER_TEMP/audit.md" >> "$GITHUB_STEP_SUMMARY"
      - name: 上传报告 artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-geo-audit
          path: ${{ runner.temp }}/audit.md
