# push 到 main → ① 在 GitHub 托管 runner 上构建 Docker 镜像并推到 GHCR
#                → ② 在服务器的 self-hosted runner 上拉新镜像并滚动更新容器。
# 两步都成功后,vincejiang.com 就是最新版。无需任何手动操作。
#
# 详见仓库根目录 SPEC.md。改动部署逻辑请同时更新 SPEC.md。
name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # 也可在 Actions 页手动触发一次

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/vincentjiang06/vincejiang-demo   # 必须全小写

jobs:
  # ── ① 构建并推送镜像(GitHub 托管 runner)──────────────────────────────
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推 GHCR 需要
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── ② 服务器侧拉镜像 + 滚动更新(self-hosted runner,跑在 Vultr 东京机)──
  # runner 主动外连 GitHub 取任务,不需要服务器开任何入站端口(契合零公网端口架构)。
  deploy:
    needs: image
    runs-on: [self-hosted, vincejiang]
    steps:
      - name: Pull latest image & roll the container
        run: |
          cd /home/vince/platform
          ./redeploy.sh svc-vincejiang
