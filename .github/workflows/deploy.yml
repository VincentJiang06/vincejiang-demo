# push 到 main → ⓪ 校验内容 → ① 构建镜像推 GHCR(latest + 本次 sha)
#                → ② self-hosted runner 把镜像 pin 到本次 sha 部署,过健康门才算成功,失败自动回滚。
# 发文章:把 md 丢进 posts/,commit message 写「发布」,push。详见仓库根目录 SPEC.md。
name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vincejiang-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/vincentjiang06/vincejiang-demo   # 必须全小写

jobs:
  # ── ⓪ 构建前校验(硬伤挡住构建:frontmatter 坏 / slug 重复 / 内容目录缺 index.html)──
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # 全历史:发布判定要读 git log
      - name: 生成发布 manifest(git 历史推导)
        run: node tools/gen-manifest.mjs
      - name: 装生成器依赖
        run: cd tools && npm ci --no-audit --no-fund
      - name: 生成器 --check(硬 gate)
        run: cd tools && node build-site.mjs --check
      - name: 行为与 Glyph 契约测试(硬 gate)
        run: cd tools && npm test
      - name: HTML 粗校验(warn-only,不阻塞)
        run: |
          cd tools && node build-site.mjs --out /tmp/site
          npx --yes html-validate "/tmp/site/index.html" "/tmp/site/blog/**/*.html" "/tmp/site/research/**/*.html" "/tmp/site/gallery/**/*.html" || true

  # ── ① 构建并推送镜像(GitHub 托管 runner)──────────────────────────────
  image:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write          # 推 GHCR 需要
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # 全历史:gen-manifest 要
      - name: 生成发布 manifest(进构建上下文,容器内 build-site 消费)
        run: node tools/gen-manifest.mjs
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── ② 服务器侧 pin sha 部署 + 健康门 + 失败回滚(self-hosted runner)──
  deploy:
    needs: image
    runs-on: [self-hosted, vincejiang]
    timeout-minutes: 10
    concurrency:
      group: vincejiang-deploy-serial
      cancel-in-progress: false
    steps:
      - name: Pin image to this sha, deploy behind health gate (auto-rollback on failure)
        run: |
          cd /home/vince/platform
          ./deploy-pinned.sh svc-vincejiang ${{ github.sha }}
